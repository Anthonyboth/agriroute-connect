workflows:
  ios-release-testflight:
    name: iOS Release to TestFlight
    max_build_duration: 60
    environment:
      ruby: 3.2.2
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.lovable.f2dbc20153194f90a3cc8dd215bbebba
      vars:
        APPLE_ID: "agrirouteconnect@gmail.com"
        APP_SPECIFIC_PASSWORD: "pcyz-gvlt-cwiv-yfmp" # Senha específica de app
        TEAM_ID: "SEU_TEAM_ID_AQUI" # Opcional, mas recomendado
        BUNDLE_ID: "app.lovable.f2dbc20153194f90a3cc8dd215bbebba"
        NODE_VERSION: "18"
      groups:
        - app_store_connect # Grupo com as variáveis acima (opcional, se quiser criptografar)
    scripts:
      - name: Build web app (React + Vite)
        script: |
          npm install
          npm run build

      - name: Sync with Capacitor
        script: |
          # Remove Gemfiles para evitar conflitos com bundler
          find . -name "Gemfile" -type f -exec mv {} {}.bak \;
          unset BUNDLE_GEMFILE

          # Instala CocoaPods
          gem install cocoapods --no-document

          # Sincroniza assets e executa pod install
          npx cap copy ios
          cd ios/App
          pod install --no-repo-update
          cd ../..

      - name: Configure iPhone only
        script: |
          plutil -replace UIDeviceFamily -json '[1]' ios/App/App/Info.plist
          plutil -remove UISupportedInterfaceOrientations~ipad ios/App/App/Info.plist || true

      - name: Fetch signing files (com Apple ID)
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --apple-id "$APPLE_ID" \
            --password "$APP_SPECIFIC_PASSWORD" \
            ${TEAM_ID:+--team-id "$TEAM_ID"}

      - name: Build IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App" \
            --config "Release"

    artifacts:
      - build/ios/ipa/*.ipa
      - ios/App/build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        apple_id: "$APPLE_ID"
        password: "$APP_SPECIFIC_PASSWORD"
        team_id: "$TEAM_ID" # Opcional, mas recomendado
        submit_to_testflight: true
