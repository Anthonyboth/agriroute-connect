workflows:
  ios-release-testflight:
    name: iOS Release to TestFlight
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.adoravel.f2dbc20153194f90a3cc8dd215bbebba
      vars:
        APP_STORE_CONNECT_ISSUER_ID: b3214eff-b69b-4b7a-bfd0-0c476ed2605c
        APP_STORE_CONNECT_KEY_IDENTIFIER: 67SDRAXWZR # KEY ID encontrado
        APP_STORE_CONNECT_PRIVATE_KEY: |
          -----BEGIN PRIVATE KEY-----
          MIGHAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBG0wawIBAQQgv5WLsj3roOV3zWQ3
          XLf/urSEb/YScSsxBhKWYRpGDcihRANCAASi8X/qcRwcfBFuspm/jRnUHD8HPqXP
          vx9dZC5M7KmuHZandSxTXaIpJe9lQY9M/eC40twqnaf3Ga7xDmdsL8Nb
          -----END PRIVATE KEY-----
        BUNDLE_ID: "app.adoravel.f2dbc20153194f90a3cc8dd215bbebba"
        NODE_VERSION: "18"
      groups:
        - app_store_connect
    scripts:
      - name: Setup Ionic/Capacitor
        script: |
          npm install
          npm install -g @ionic/cli
          ionic build --prod
          npx cap sync ios

      - name: Configure iPhone only
        script: |
          plutil -replace UIDeviceFamily -json '[1]' ios/App/App/Info.plist
          plutil -remove UISupportedInterfaceOrientations~ipad ios/App/App/Info.plist || true

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID \
            --key-id $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --private-key @env:APP_STORE_CONNECT_PRIVATE_KEY

      - name: Build IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App" \
            --config "Release"

    artifacts:
      - build/ios/ipa/*.ipa
      - ios/App/build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        submit_to_testflight: true
