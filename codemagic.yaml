workflows:
  ios-release-testflight:
    name: iOS Release to TestFlight
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.agriroute.app # ALTERE PARA O MESMO DO capacitor.config.ts
      vars:
        APP_STORE_CONNECT_ISSUER_ID: b3214eff-b69b-4b7a-bfd0-0c476ed2605c
        APP_STORE_CONNECT_KEY_IDENTIFIER: SEU_KEY_ID_AQUI
        APP_STORE_CONNECT_PRIVATE_KEY: |
          -----BEGIN PRIVATE KEY-----
          COLE_AQUI_SUA_CHAVE_PRIVADA_COMPLETA_DO_ARQUIVO_P8
          -----END PRIVATE KEY-----
        BUNDLE_ID: "com.agriroute.app" # MESMO VALOR DO capacitor.config.ts
        NODE_VERSION: "18"
      groups:
        - app_store_connect
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Install Node dependencies
        script: |
          npm install
          npm install -g @ionic/cli native-run cordova-res

      - name: Build web assets
        script: |
          ionic build --prod

      - name: Sync with Capacitor
        script: |
          npx cap sync ios

      - name: Configure for iPhone only
        script: |
          echo "Configurando app para iPhone apenas..."

          # Modificar o Info.plist para iPhone apenas
          INFO_PLIST="ios/App/App/Info.plist"

          if [ -f "$INFO_PLIST" ]; then
            # Remover suporte a iPad
            /usr/libexec/PlistBuddy -c "Delete :UIDeviceFamily:1" "$INFO_PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Set :UIDeviceFamily:0 integer 1" "$INFO_PLIST" 2>/dev/null || true
            
            # Remover orientações específicas do iPad
            /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations~ipad" "$INFO_PLIST" 2>/dev/null || true
            
            echo "✅ App configurado para iPhone apenas"
          else
            echo "⚠️ Info.plist não encontrado em $INFO_PLIST"
          fi

      - name: Set build version
        script: |
          cd ios/App
          agvtool new-marketing-version $(date +"%Y.%m.%d")
          agvtool new-version -all $(git rev-list --count HEAD)
          cd ../..

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID \
            --key-id $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --private-key @env:APP_STORE_CONNECT_PRIVATE_KEY

      - name: Add certificates to keychain
        script: |
          keychain initialize
          app-store-connect decode-certificate \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID \
            --key-id $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --private-key @env:APP_STORE_CONNECT_PRIVATE_KEY

      - name: Build iOS app
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App" \
            --config "Release" \
            --destination "generic/platform=iOS"
          cd ../..

    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - ios/App/build/ios/archive/*.xcarchive

    publishing:
      app_store_connect:
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        submit_to_testflight: true

      email:
        recipients:
          - anthony_pva@hotmail.com
        notify:
          success: true
          failure: true
