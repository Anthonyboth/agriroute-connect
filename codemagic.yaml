workflows:
  ios-release-testflight:
    name: iOS Release to TestFlight
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.seu.bundle.id
      vars:
        APP_STORE_CONNECT_ISSUER_ID: b3214eff-b69b-4b7a-bfd0-0c476ed2605c
        APP_STORE_CONNECT_KEY_IDENTIFIER: SEU_KEY_ID_AQUI
        APP_STORE_CONNECT_PRIVATE_KEY: |
          -----BEGIN PRIVATE KEY-----
          COLE_AQUI_SUA_CHAVE_PRIVADA_COMPLETA_DO_ARQUIVO_P8
          -----END PRIVATE KEY-----
        BUNDLE_ID: "com.seu.bundle.id"
        XCODE_WORKSPACE: "SeuWorkspace.xcworkspace"
        XCODE_SCHEME: "SeuScheme"
      groups:
        - app_store_connect
    scripts:
      - name: Install dependencies
        script: |
          # Instalar dependências do CocoaPods se necessário
          # pod install --repo-update

      - name: Set up code signing
        script: |
          echo "Configurando code signing..."

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID \
            --key-id $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --private-key @env:APP_STORE_CONNECT_PRIVATE_KEY

      - name: Add certificates to keychain
        script: |
          keychain initialize

      - name: Apply code signing
        script: |
          app-store-connect decode-certificate \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID \
            --key-id $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --private-key @env:APP_STORE_CONNECT_PRIVATE_KEY \
            --certificate @env:APP_STORE_CONNECT_CERTIFICATE

      - name: Set build version
        script: |
          agvtool new-marketing-version $(date +"%Y.%m.%d")
          agvtool new-version -all $(git rev-list --count HEAD)

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        submit_to_testflight: true
        # Opcional: distribuir para grupos específicos do TestFlight
        # beta_groups:
        #   - "Grupo de Testadores Internos"
        #   - "Grupo de Testadores Externos"

      email:
        recipients:
          - seu-email@exemplo.com
        notify:
          success: true
          failure: true

      slack:
        channel: "#seu-canal"
        notify_on_build_start: true
        notify:
          success: true
          failure: true
