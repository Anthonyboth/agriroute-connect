workflows:
  ios-release-testflight:
    name: iOS Release TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      node: 20
      xcode: latest
      cocoapods: default
      groups:
        - appstore_credentials

    cache:
      cache_paths:
        - $HOME/.npm
        - $HOME/.cocoapods
        - $HOME/Library/Caches/CocoaPods

    scripts:
      - name: Setup Bundler and Gems
        script: |
          gem install bundler -v 2.5.23 --no-document
          bundle _2.5.23_ config set path vendor/bundle
          cd ios/App
          bundle _2.5.23_ install

      - name: Install Node Dependencies
        script: |
          rm -f package-lock.json
          npm install

      - name: Build Web
        script: |
          npm run build

      - name: Capacitor Sync
        script: |
          npx cap sync ios

      - name: Clean and Reinstall CocoaPods
        script: |
          cd ios/App
          rm -rf Pods Podfile.lock
          pod repo update
          bundle _2.5.23_ exec pod install

      - name: Force iPhone Only
        script: |
          /usr/libexec/PlistBuddy -c "Delete :UIDeviceFamily" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily array" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily:0 integer 1" ios/App/App/Info.plist
          sed -i '' 's/TARGETED_DEVICE_FAMILY = "1,2"/TARGETED_DEVICE_FAMILY = 1/g' ios/App/App.xcodeproj/project.pbxproj
          sed -i '' 's/TARGETED_DEVICE_FAMILY = "1, 2"/TARGETED_DEVICE_FAMILY = 1/g' ios/App/App.xcodeproj/project.pbxproj

      - name: Set Version
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 151" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" ios/App/App/Info.plist

      - name: Inject Code Signing Settings
        script: |
          cd ios/App
          sed -i '' 's/CODE_SIGN_STYLE = Manual;/CODE_SIGN_STYLE = Automatic;/g' App.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = "";/DEVELOPMENT_TEAM = 4YULT95XAK;/g' App.xcodeproj/project.pbxproj
          # Ensure DEVELOPMENT_TEAM is set in all build configurations
          ruby -e '
            path = "App.xcodeproj/project.pbxproj"
            content = File.read(path)
            unless content.include?("DEVELOPMENT_TEAM = 4YULT95XAK")
              content.gsub!(/buildSettings = \{/) { |m| "#{m}\n\t\t\t\tDEVELOPMENT_TEAM = 4YULT95XAK;" }
            end
            content.gsub!(/CODE_SIGN_STYLE = .*;/, "CODE_SIGN_STYLE = Automatic;")
            File.write(path, content)
          '
          echo "=== Verification ==="
          grep -c "DEVELOPMENT_TEAM = 4YULT95XAK" App.xcodeproj/project.pbxproj || true

      - name: Setup App Store Connect API Key
        script: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8

      - name: Build IPA
        script: |
          xcodebuild \
          -workspace ios/App/App.xcworkspace \
          -scheme App \
          -configuration Release \
          -archivePath build/App.xcarchive \
          -authenticationKeyPath ~/".appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8" \
          -authenticationKeyID $APP_STORE_CONNECT_KEY_IDENTIFIER \
          -authenticationKeyIssuerID $APP_STORE_CONNECT_ISSUER_ID \
          -allowProvisioningUpdates \
          DEVELOPMENT_TEAM=4YULT95XAK \
          CODE_SIGN_STYLE=Automatic \
          archive

          xcodebuild \
          -exportArchive \
          -archivePath build/App.xcarchive \
          -exportOptionsPlist ios/App/exportOptions.plist \
          -exportPath build \
          -authenticationKeyPath ~/".appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8" \
          -authenticationKeyID $APP_STORE_CONNECT_KEY_IDENTIFIER \
          -authenticationKeyIssuerID $APP_STORE_CONNECT_ISSUER_ID \
          -allowProvisioningUpdates

    artifacts:
      - build/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
