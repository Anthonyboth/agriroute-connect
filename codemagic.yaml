workflows:
  ios-release-testflight:
    name: iOS Release to TestFlight
    max_build_duration: 60
    environment:
      # Versão do Ruby compatível com ARM64 (Apple Silicon) – resolve erro de compilação
      ruby: 3.2.2
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.lovable.f2dbc20153194f90a3cc8dd215bbebba
      vars:
        APP_STORE_CONNECT_ISSUER_ID: b3214eff-b69b-4b7a-bfd0-0c476ed2605c
        APP_STORE_CONNECT_KEY_IDENTIFIER: 67SDRAXWZR
        # Chave privada fornecida por você (já validada)
        APP_STORE_CONNECT_PRIVATE_KEY: |
          -----BEGIN PRIVATE KEY-----
          MIGHAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBG0wawIBAQQgv5WLsj3roOV3zWQ3
          XLf/urSEb/YScSsxBhKWYRpGDcihRANCAASi8X/qcRwcfBFuspm/jRnUHD8HPqXP
          vx9dZC5M7KmuHZandSxTXaIpJe9lQY9M/eC40twqnaf3Ga7xDmdsL8Nb
          -----END PRIVATE KEY-----
        BUNDLE_ID: "app.lovable.f2dbc20153194f90a3cc8dd215bbebba"
        NODE_VERSION: "18"
      groups:
        - app_store_connect # Grupo com as variáveis acima (já configurado no Codemagic)
    scripts:
      - name: Build web app (React + Vite)
        script: |
          npm install
          npm run build  # Gera os arquivos na pasta dist (padrão do Vite)

      - name: Sync with Capacitor (sem conflitos de Ruby)
        script: |
          # Remove Gemfile temporariamente para evitar conflitos com bundler
          if [ -f "Gemfile" ]; then
            mv Gemfile Gemfile.bak
          fi
          # Garante que o bundler correto esteja instalado (opcional, mas seguro)
          gem install bundler -v '~> 2.5' --no-document
          npx cap sync ios  # Copia de dist/ para ios/App/App/public

      - name: Configure iPhone only
        script: |
          # Define o app para rodar apenas em iPhone (remove suporte a iPad)
          plutil -replace UIDeviceFamily -json '[1]' ios/App/App/Info.plist
          plutil -remove UISupportedInterfaceOrientations~ipad ios/App/App/Info.plist || true

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID \
            --key-id $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --private-key @env:APP_STORE_CONNECT_PRIVATE_KEY

      - name: Build IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App" \
            --config "Release"

    artifacts:
      - build/ios/ipa/*.ipa
      - ios/App/build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        submit_to_testflight: true # Envia para o TestFlight automaticamente
