workflows:
  ios-release-testflight:
    name: iOS Release to TestFlight
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.lovable.f2dbc20153194f90a3cc8dd215bbebba
      vars:
        APPLE_ID: "agrirouteconnect@gmail.com"
        APP_SPECIFIC_PASSWORD: "pcyz-gvlt-cwiv-yfmp"
        TEAM_ID: "4YULT95XAK"
        BUNDLE_ID: "app.lovable.f2dbc20153194f90a3cc8dd215bbebba"
        NODE_VERSION: "18"
      groups:
        - app_store_connect
    scripts:
      - name: 1. Instalar dependências
        script: |
          npm install
          npm run build
          gem install fastlane cocoapods -NV

      - name: 2. Sincronizar com Capacitor
        script: |
          npx cap sync ios

      - name: 3. Configurar para iPhone apenas
        script: |
          plutil -replace UIDeviceFamily -json '[1]' ios/App/App/Info.plist
          plutil -remove UISupportedInterfaceOrientations~ipad ios/App/App/Info.plist || true

      - name: 4. Buscar perfis com fastlane match
        script: |
          cd ios/App
          fastlane run match appstore \
            username:"$APPLE_ID" \
            team_id:"$TEAM_ID" \
            readonly:false \
            app_identifier:"$BUNDLE_ID" \
            type:"appstore" \
            force:true
          cd ../..

      - name: 5. Gerar export_options.plist e construir IPA
        script: |
          cd ios/App
          cat > export_options.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>$TEAM_ID</string>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App" \
            --config "Release" \
            --export-options-plist export_options.plist
          # Verificar onde o IPA foi gerado
          echo "Conteúdo do diretório build:"
          find build -type f 2>/dev/null || echo "build não encontrado"
          cd ../..

      - name: 6. Enviar para TestFlight
        script: |
          # Procurar por qualquer arquivo .ipa em qualquer lugar
          IPA_PATH=$(find . -path "*.ipa" -type f | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "IPA não encontrado em nenhum local"
            exit 1
          fi
          echo "IPA encontrado em: $IPA_PATH"
          xcrun altool --upload-app -f "$IPA_PATH" -u "$APPLE_ID" -p "$APP_SPECIFIC_PASSWORD" --type ios --verbose

    artifacts:
      - build/ios/ipa/*.ipa
      - ios/App/build/ios/ipa/*.ipa
      - **/*.ipa

    publishing:
      email:
        recipients:
          - anthony_pva@hotmail.com
        notify:
          success: true
          failure: true