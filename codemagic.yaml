workflows:
  ios-release-testflight:
    name: iOS Release to TestFlight
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.lovable.f2dbc20153194f90a3cc8dd215bbebba
      vars:
        # API Key do App Store Connect (gerada hoje)
        APP_STORE_CONNECT_ISSUER_ID: b3214eff-b69b-4b7a-bfd0-0c476ed2605c
        APP_STORE_CONNECT_KEY_IDENTIFIER: "44TTKA2QF4"
        APP_STORE_CONNECT_PRIVATE_KEY: |
          -----BEGIN PRIVATE KEY-----
          MIGTAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBHkwdwIBAQQgigwhCuCxA6te7/KL
          ioXsyBPjeBQVL4O8yhOam6tBTaqgCgYIKoZIzj0DAQehRANCAATXuQQUITAEbh0i
          6OMfYYImZtXgHbifvEj+FM4I5bpym3kk0YMDzenPrpbWZwoh/SVmImP5H1KcLb6j
          kPkRlUpe
          -----END PRIVATE KEY-----
        # Apple ID para upload no TestFlight (senha específica de app)
        APPLE_ID: "agrirouteconnect@gmail.com"
        APP_SPECIFIC_PASSWORD: "pcyz-gvlt-cwiv-yfmp"
        TEAM_ID: "4YULT95XAK"
        BUNDLE_ID: "app.lovable.f2dbc20153194f90a3cc8dd215bbebba"
        NODE_VERSION: "18"
      groups:
        - app_store_connect
    scripts:
      - name: 1. Instalar dependências
        script: |
          set -e
          # Remove qualquer Gemfile para evitar conflitos com Bundler
          find . -name "Gemfile" -type f -exec mv {} {}.bak \;
          unset BUNDLE_GEMFILE
          npm install
          npm run build
          # Instala a gem correta: app_store_connect (com underscore)
          gem install app_store_connect -NV

      - name: 2. Sync Capacitor
        script: |
          set -e
          npx cap sync ios

      - name: 3. Configurar iPhone apenas
        script: |
          set -e
          plutil -replace UIDeviceFamily -json '[1]' ios/App/App/Info.plist
          plutil -remove UISupportedInterfaceOrientations~ipad ios/App/App/Info.plist || true

      - name: 4. Garantir certificado de distribuição
        script: |
          set -e
          # Lista certificados existentes do tipo distribuição
          CERT_LIST=$(app-store-connect list-certificates \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID \
            --key-id $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --private-key @env:APP_STORE_CONNECT_PRIVATE_KEY \
            --filter[certificateType]=IOS_DISTRIBUTION 2>/dev/null || echo "")
          if echo "$CERT_LIST" | grep -q '"id"'; then
            echo "✅ Certificado de distribuição já existe."
          else
            echo "📄 Criando novo certificado de distribuição..."
            # Gera CSR usando Ruby (já disponível no ambiente)
            CSR=$(ruby -e '
              require "openssl"
              key = OpenSSL::PKey::RSA.new(2048)
              csr = OpenSSL::X509::Request.new
              csr.subject = OpenSSL::X509::Name.parse("/CN=Distribution Certificate")
              csr.public_key = key.public_key
              csr.sign(key, OpenSSL::Digest::SHA256.new)
              puts csr.to_pem
            ')
            # Cria o certificado
            app-store-connect create-certificate \
              --type IOS_DISTRIBUTION \
              --csr-content "$CSR" \
              --issuer-id $APP_STORE_CONNECT_ISSUER_ID \
              --key-id $APP_STORE_CONNECT_KEY_IDENTIFIER \
              --private-key @env:APP_STORE_CONNECT_PRIVATE_KEY
            echo "✅ Certificado criado com sucesso."
          fi

      - name: 5. Buscar perfis (signing files)
        script: |
          set -e
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID \
            --key-id $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --certificate-key @env:APP_STORE_CONNECT_PRIVATE_KEY

      - name: 6. Gerar export_options.plist e construir IPA
        script: |
          set -e
          cd ios/App
          cat > export_options.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>$TEAM_ID</string>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          EOF
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App" \
            --config "Release" \
            --export-options-plist export_options.plist
          cd ../..
          echo "✅ IPA gerado. Procurando..."
          find . -name "*.ipa" -type f

      - name: 7. Enviar para TestFlight
        script: |
          set -e
          IPA_PATH=$(find ios/App/build/ios/ipa -name "*.ipa" 2>/dev/null | head -1)
          if [ -z "$IPA_PATH" ]; then
            IPA_PATH=$(find build/ios/ipa -name "*.ipa" 2>/dev/null | head -1)
          fi
          if [ -z "$IPA_PATH" ]; then
            echo "❌ IPA não encontrado"
            exit 1
          fi
          echo "📦 Enviando IPA: $IPA_PATH"
          xcrun altool --upload-app -f "$IPA_PATH" -u "$APPLE_ID" -p "$APP_SPECIFIC_PASSWORD" --type ios --verbose

    artifacts:
      - "build/ios/ipa/*.ipa"
      - "ios/App/build/ios/ipa/*.ipa"

    publishing:
      email:
        recipients:
          - anthony_pva@hotmail.com
        notify:
          success: true
          failure: true
