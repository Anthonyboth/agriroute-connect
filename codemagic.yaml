workflows:
  ios-release-testflight:
    name: iOS Release to TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    environment:
      xcode: 26.2
      node: 20.9.0
      groups:
        - app_store_credentials
      vars:
        BUNDLE_ID: "app.lovable.f2dbc20153194f90a3cc8dd215bbebba"

    scripts:
      - name: Install dependencies
        script: |
          rm -f package-lock.json
          npm install

      - name: Validate iOS icon assets
        script: |
          test -f resources/icon.png
          test -f ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-512@2x.png
          grep -q '"filename" : "AppIcon-512@2x.png"' ios/App/App/Assets.xcassets/AppIcon.appiconset/Contents.json
          echo "✅ Ícones validados"

      - name: Build web app
        script: |
          npm run build

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files \
            $BUNDLE_ID \
            --type IOS_APP_STORE \
            --create

      - name: Add certificates to keychain
        script: |
          keychain add-certificates

      - name: Set up code signing settings
        script: |
          xcode-project use-profiles

      - name: Set version (plist)
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 151" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" ios/App/App/Info.plist

      - name: Build IPA for App Store
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App \
            --archive-flags="-destination 'generic/platform=iOS'" \
            --export-options-plist ios/App/exportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers

      email:
        recipients:
          - dev@agriroute.com
        notify:
          success: true
          failure: true
