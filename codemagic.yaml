workflows:
  ios-release-testflight:
    name: iOS Release TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 20
      xcode: latest
      cocoapods: default

    scripts:
      - name: Force correct Bundler
        script: |
          gem uninstall bundler -a -x || true
          gem install bundler -v 2.5.23 --no-document
          gem cleanup
          bundle _2.5.23_ config set path 'vendor/bundle'

      - name: Install Node dependencies
        script: |
          rm -f package-lock.json
          npm install

      - name: Build Web
        script: |
          npm run build

      - name: Capacitor Sync
        script: |
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          rm -rf Pods Podfile.lock
          pod repo update
          pod install

      - name: Force iPhone Only
        script: |
          /usr/libexec/PlistBuddy -c "Delete :UIDeviceFamily" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily array" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :UIDeviceFamily:0 integer 1" ios/App/App/Info.plist

      - name: Set Version
        script: |
          BUILD_NUMBER=$(date +%s)

          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.151" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" ios/App/App/Info.plist

      - name: Code Signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcodebuild \
          -workspace ios/App/App.xcworkspace \
          -scheme App \
          -configuration Release \
          -archivePath build/App.xcarchive \
          archive

          xcodebuild \
          -exportArchive \
          -archivePath build/App.xcarchive \
          -exportOptionsPlist ios/App/exportOptions.plist \
          -exportPath build

    artifacts:
      - build/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
