workflows:
  ios-release-testflight:
    name: iOS Release to TestFlight
    max_build_duration: 60
    environment:
      ruby: 3.2.2
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.lovable.f2dbc20153194f90a3cc8dd215bbebba
      vars:
        APPLE_ID: "agrirouteconnect@gmail.com"
        APP_SPECIFIC_PASSWORD: "pcyz-gvlt-cwiv-yfmp"
        TEAM_ID: "4YULT95XAK"
        BUNDLE_ID: "app.lovable.f2dbc20153194f90a3cc8dd215bbebba"
        NODE_VERSION: "18"
      groups:
        - app_store_connect
    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm run build
          gem install bundler
          bundle install

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Configure iPhone only
        script: |
          plutil -replace UIDeviceFamily -json '[1]' ios/App/App/Info.plist
          plutil -remove UISupportedInterfaceOrientations~ipad ios/App/App/Info.plist || true

      - name: Fetch signing files with fastlane
        script: |
          cd ios/App
          fastlane run match appstore \
            username:"$APPLE_ID" \
            team_id:"$TEAM_ID" \
            readonly:false \
            app_identifier:"$BUNDLE_ID" \
            type:"appstore" \
            force:true
          cd ../..

      - name: Build IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App" \
            --config "Release"

      - name: Upload to TestFlight
        script: |
          IPA_PATH=$(find ios/App/build/ios/ipa -name "*.ipa" | head -1)
          xcrun altool --upload-app -f "$IPA_PATH" -u "$APPLE_ID" -p "$APP_SPECIFIC_PASSWORD" --type ios --verbose

    artifacts:
      - build/ios/ipa/*.ipa
      - ios/App/build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - anthony_pva@hotmail.com
