workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 20
      xcode: latest
      cocoapods: default

    scripts:
      - name: Fix Bundler for Fastlane
        script: |
          gem uninstall bundler -a -x || true
          gem install bundler -v 2.5.23 --no-document
          bundler _2.5.23_ -v

      - name: Install npm dependencies
        script: |
          rm -f package-lock.json
          npm install

      - name: Build web app
        script: |
          npm run build

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Clean and install CocoaPods
        script: |
          cd ios/App
          rm -rf Pods
          rm -f Podfile.lock

          export BUNDLE_GEMFILE="$CM_BUILD_DIR/ios/App/Gemfile"

          bundler _2.5.23_ install
          bundler _2.5.23_ exec pod repo update
          bundler _2.5.23_ exec pod install

      - name: Force iPhone only
        script: |
          /usr/libexec/PlistBuddy -c "Set :UIDeviceFamily:0 1" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Delete :UIDeviceFamily:1" ios/App/App/Info.plist || true

          sed -i '' 's/TARGETED_DEVICE_FAMILY = "1,2"/TARGETED_DEVICE_FAMILY = "1"/g' ios/App/App.xcodeproj/project.pbxproj || true

      - name: Set version and build number
        script: |
          BUILD_NUMBER=$(date +%s)

          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.151" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" ios/App/App/Info.plist

      - name: Configure code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcodebuild \
          -workspace ios/App/App.xcworkspace \
          -scheme App \
          -configuration Release \
          -archivePath build/App.xcarchive \
          archive

          xcodebuild -exportArchive \
          -archivePath build/App.xcarchive \
          -exportOptionsPlist ios/App/exportOptions.plist \
          -exportPath build

    artifacts:
      - build/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
