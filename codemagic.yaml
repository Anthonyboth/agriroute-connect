workflows:
  ios-release-testflight:
    name: iOS Release to TestFlight
    max_build_duration: 60
    environment:
      ruby: 3.2.2
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.lovable.f2dbc20153194f90a3cc8dd215bbebba
      vars:
        APP_STORE_CONNECT_ISSUER_ID: b3214eff-b69b-4b7a-bfd0-0c476ed2605c
        APP_STORE_CONNECT_KEY_IDENTIFIER: NOVO_KEY_ID_AQUI
        APP_STORE_CONNECT_PRIVATE_KEY: |
          -----BEGIN PRIVATE KEY-----
          COLE_AQUI_O_CONTEUDO_COMPLETO_DO_NOVO_ARQUIVO_P8
          -----END PRIVATE KEY-----
        BUNDLE_ID: "app.lovable.f2dbc20153194f90a3cc8dd215bbebba"
        NODE_VERSION: "18"
      groups:
        - app_store_connect
    scripts:
      - name: Build web app (React + Vite)
        script: |
          npm install
          npm run build

      - name: Sync with Capacitor
        script: |
          find . -name "Gemfile" -type f -exec mv {} {}.bak \;
          unset BUNDLE_GEMFILE
          gem install cocoapods --no-document
          npx cap copy ios
          cd ios/App
          pod install --no-repo-update
          cd ../..

      - name: Configure iPhone only
        script: |
          plutil -replace UIDeviceFamily -json '[1]' ios/App/App/Info.plist
          plutil -remove UISupportedInterfaceOrientations~ipad ios/App/App/Info.plist || true

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID \
            --key-id $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --certificate-key @env:APP_STORE_CONNECT_PRIVATE_KEY

      - name: Build IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme "App" \
            --config "Release"

      - name: Upload to TestFlight (com API Key)
        script: |
          IPA_PATH=$(find ios/App/build/ios/ipa -name "*.ipa" | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "IPA not found"
            exit 1
          fi
          # Upload usando a mesma API Key (via app-store-connect)
          app-store-connect publish \
            --ipa "$IPA_PATH" \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID \
            --key-id $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --private-key @env:APP_STORE_CONNECT_PRIVATE_KEY

    artifacts:
      - build/ios/ipa/*.ipa
      - ios/App/build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - anthony_pva@hotmail.com
        notify:
          success: true
          failure: true
